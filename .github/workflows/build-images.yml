name: CI Pipeline

on:
  push:
    branches: ['**']
  workflow_dispatch:
    inputs:
      database_image_branch:
        description: "Database Branch name to use for running tests"
        required: true
        default: "master"
        type: string

jobs:
  build:
    name: Build & Publish i2b2-core-server image
    runs-on: ubuntu-latest
    environment: dev
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Check if secrets exist and output a boolean flag
      - name: Check for Docker Secrets
        id: secret-check
        run: |
          if [ -n "${{ secrets.DOCKER_LOGIN_TOKEN }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      # Only attempt login if secrets are present
      - name: Login to Docker Registry
        if: steps.secret-check.outputs.has_secrets == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HOST }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}

      - name: Determine tag
        id: vars
        run: |
          echo "core_tag=${{ github.ref_name }}" >> $GITHUB_ENV
          echo "Using tag: ${{ github.ref_name }}"

      - name: Build, Save, and conditionally Push image
        run: |
          set -e 
          
          # Provide local fallbacks if secrets are missing during a fork/clone run
          export docker_username=${{ secrets.DOCKER_HOST || 'localuser' }}
          export docker_reponame=${{ secrets.DOCKER_REPO || 'i2b2-core' }}
          
          cd docker/
          bash create_docker_image.sh "$core_tag"
          
          export BUILT_IMAGE="${docker_username}/${docker_reponame}:i2b2-core-server_$core_tag"
          
          echo "Saving image: $BUILT_IMAGE"
          docker save -o /tmp/i2b2-core-server.tar "$BUILT_IMAGE"

      # Upload the tarball as an artifact
      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: i2b2-docker-image
          path: /tmp/i2b2-core-server.tar
          retention-days: 1 # Short retention to save GitHub storage space

  test:   
    name: Run DB Tests
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    
    strategy:
      fail-fast: false
      matrix:
        db: [mssql, pg, oracle]

    steps:
      - name: Checkout Test Repository
        uses: actions/checkout@v4
        with:
          repository: vaditya1998/i2b2-docker
          path: i2b2-docker

      # Download the tarball from the build job
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: i2b2-docker-image
          path: /tmp

      # Load the image into the local Docker daemon
      - name: Load Docker Image
        run: |
          docker load -i /tmp/i2b2-core-server.tar
          docker images

      - name: Check for Docker Secrets
        id: secret-check
        run: |
          if [ -n "${{ secrets.DOCKER_LOGIN_TOKEN }}" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Registry
        if: steps.secret-check.outputs.has_secrets == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HOST }}
          password: ${{ secrets.DOCKER_LOGIN_TOKEN }}          
          
      - name: Run Test Cases
        env:
          # Map the job output to a local environment variable
          HAS_SECRETS: ${{ needs.build.outputs.ci_has_secrets }}
        run: |
          set -e
          cd i2b2-docker/${{ matrix.db }}

          export docker_username=${{ secrets.DOCKER_HOST || 'localuser' }}
          export docker_reponame=${{ secrets.DOCKER_REPO || 'i2b2-core' }}
          
          # Maintain the tag prefix fix from earlier
          # export core_tag="i2b2-core-server_${{ github.ref_name }}"

          echo "Running ${{ matrix.db }} test cases for tag: $core_tag"
          
          bash test_case.sh "$core_tag" "${{ inputs.database_image_branch || 'master' }}"